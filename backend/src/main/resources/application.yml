spring:
  application:
    name: maisquemimo-commerce

  # ========================================
  # DATABASE CONFIGURATION
  # Suporta variáveis de ambiente para Railway/Neon
  # Em produção: use SSL (sslmode=require)
  # ========================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:maisquemimo_db}?sslmode=${PGSSLMODE:disable}}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ========================================
  # JPA / HIBERNATE CONFIGURATION
  # ========================================
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        type:
          preferred_uuid_jdbc_type: UUID
    show-sql: false

  # ========================================
  # DATABASE MIGRATIONS (Flyway)
  # ========================================
  flyway:
    enabled: true
    baseline-on-migrate: true

# ========================================
# SPRING PROFILES
# dev: Desenvolvimento com debug
# prod: Produção com otimizações
# ========================================
spring.profiles.active: ${SPRING_PROFILES_ACTIVE:dev}

# ========================================
# SERVER CONFIGURATION
# ========================================
server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /api
  error:
    include-message: always

# ========================================
# LOGGING CONFIGURATION (Default: INFO)
# Sobrescrito por application-dev.yml e application-prod.yml
# ========================================
logging:
  level:
    root: INFO

# ========================================
# JWT SECURITY CONFIGURATION
# Variáveis de ambiente para produção
# ========================================
jwt:
  secret: ${JWT_SECRET:deve-ser-definido-em-producao}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ========================================
# ACTUATOR (Padrão: apenas health)
# ========================================
management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

